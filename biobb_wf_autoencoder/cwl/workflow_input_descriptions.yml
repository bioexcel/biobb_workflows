step3_build_model_output_model_pth_path: model.pth
step3_build_model_config: '{"properties": {"model_type": "AutoEncoder", "n_cvs": 3, "encoder_layers": [933, 747, 561, 375, 189], "decoder_layers": [189, 375, 561, 747, 933], "options": {"norm_in": {"mode": "min_max"}, "encoder": {"activation": "relu", "batchnorm": true, "dropout": 0.0, "last_layer_activation": false}, "decoder": {"activation": "relu", "batchnorm": true, "dropout": 0.0, "last_layer_activation": "sigmoid"}, "optimizer": {"lr": 1e-05}}}}'
step4_train_model_output_model_pth_path: apo_trained_model.pth
step4_train_model_output_metrics_npz_path: model_training_metrics.npz
step4_train_model_config: '{"properties": {"Dataset": {"batch_size": 128, "shuffle": true, "split": {"random_split": true, "train_prop": 0.9, "val_prop": 0.1}}, "Trainer": {"max_epochs": 100, "enable_checkpointing": false, "callbacks": {}}}}'
