on:
  push:
    paths:
      - common/docker/Dockerfile
      - .github/workflows/docker.yaml
  workflow_dispatch:

name: Dockerfile
jobs:
  dockerfile:
    runs-on: ubuntu-latest
    steps:
      - uses: peter-murray/workflow-application-token-action@v3
        id: generate_token
        with:
          application_id: ${{ vars.GHAPUSH }}
          application_private_key: ${{ secrets.GHAPUSH }}
      - uses: actions/checkout@v3
        with:
          token: ${{ steps.generate_token.outputs.token }}
      - name: Copy Dockerfile
        run: |
          cp common/docker/Dockerfile biobb_wf_amber_abc_setup/docker/Dockerfile
          sed -i '83a\        cp -r /data/ABCix_config_files \\"$dir/ABCix_config_files\\"; \\' biobb_wf_amber_abc_setup/docker/Dockerfile
          cp common/docker/Dockerfile biobb_wf_amber_md_setup/docker/Dockerfile
          cp common/docker/Dockerfile biobb_wf_amber_md_setup_lig/docker/Dockerfile
          cp common/docker/Dockerfile biobb_wf_autoencoder/docker/Dockerfile
          sed -i '44a# Fix OpenMP issues when running amd64 image on ARM64 via QEMU emulation' biobb_wf_autoencoder/docker/Dockerfile
          sed -i '45aENV KMP_DUPLICATE_LIB_OK=TRUE' biobb_wf_autoencoder/docker/Dockerfile
          sed -i '46aENV OMP_NUM_THREADS=1' biobb_wf_autoencoder/docker/Dockerfile
          sed -i '47aENV KMP_AFFINITY=disabled' biobb_wf_autoencoder/docker/Dockerfile
          sed -i '48a\\' biobb_wf_autoencoder/docker/Dockerfile
          cp common/docker/Dockerfile biobb_wf_cmip/docker/Dockerfile
          sed -i '83a\        cp -r /data/Files \\"$dir/Files\\"; \\' biobb_wf_cmip/docker/Dockerfile
          cp common/docker/Dockerfile biobb_wf_dna_helparms/docker/Dockerfile
          sed -i '47a# Copy the .curvesplus folder into the Docker image' biobb_wf_dna_helparms/docker/Dockerfile
          sed -i '48aCOPY .curvesplus /opt/conda/envs/$REPOSITORY' biobb_wf_dna_helparms/docker/Dockerfile
          sed -i '49a\\' biobb_wf_dna_helparms/docker/Dockerfile
          sed -i '86a\        cp -r /data/TRAJ \\"$dir/TRAJ\\"; \\' biobb_wf_dna_helparms/docker/Dockerfile
          cp common/docker/Dockerfile biobb_wf_flexdyn/docker/Dockerfile
          cp common/docker/Dockerfile biobb_wf_flexserv/docker/Dockerfile
          sed -i '83a\        cp -r /data/Files \\"$dir/Files\\"; \\' biobb_wf_flexserv/docker/Dockerfile
          cp common/docker/Dockerfile biobb_wf_godmd/docker/Dockerfile
          cp common/docker/Dockerfile biobb_wf_haddock/docker/Dockerfile
          sed -i '9a# Install build tools' biobb_wf_haddock/docker/Dockerfile
          sed -i '10aRUN apt-get update && \' biobb_wf_haddock/docker/Dockerfile
          sed -i '11a\    apt-get install -y build-essential && \' biobb_wf_haddock/docker/Dockerfile
          sed -i '12a\    rm -rf /var/lib/apt/lists/*' biobb_wf_haddock/docker/Dockerfile
          sed -i '13a\\' biobb_wf_haddock/docker/Dockerfile          
          sed -i '38a\    wget https://raw.githubusercontent.com/bioexcel/$REPOSITORY/main/$REPOSITORY/notebooks/variables.py -O /app/variables.py; \\' biobb_wf_haddock/docker/Dockerfile
          sed -i '89a\        cp /app/variables.py \\"$dir/variables.py\\"; \\' biobb_wf_haddock/docker/Dockerfile
          # UNCOMMENT IF PLAIN INSTALLATION DOES NOT WORK
          # sed -i '49a# Install additional pip packages inside the conda environment' biobb_wf_haddock/docker/Dockerfile
          # sed -i '50aRUN conda run -n $REPOSITORY pip install haddock3==2025.11.0' biobb_wf_haddock/docker/Dockerfile
          # sed -i '51a\\' biobb_wf_haddock/docker/Dockerfile
          cp common/docker/Dockerfile biobb_wf_ligand_parameterization/docker/Dockerfile
          cp common/docker/Dockerfile biobb_wf_md_setup/docker/Dockerfile
          cp common/docker/Dockerfile biobb_wf_mem/docker/Dockerfile
          sed -i '33a\    wget https://raw.githubusercontent.com/bioexcel/$REPOSITORY/main/$REPOSITORY/notebooks/variables.py -O /app/variables.py; \\' biobb_wf_mem/docker/Dockerfile
          sed -i '45a# Fix OpenMP issues when running amd64 image on ARM64 via QEMU emulation' biobb_wf_mem/docker/Dockerfile
          sed -i '46aENV KMP_DUPLICATE_LIB_OK=TRUE' biobb_wf_mem/docker/Dockerfile
          sed -i '47aENV OMP_NUM_THREADS=1' biobb_wf_mem/docker/Dockerfile
          sed -i '48aENV KMP_AFFINITY=disabled' biobb_wf_mem/docker/Dockerfile
          sed -i '49a\\' biobb_wf_mem/docker/Dockerfile
          sed -i '89a\        cp /app/variables.py \\"$dir/variables.py\\"; \\' biobb_wf_mem/docker/Dockerfile
          cp common/docker/Dockerfile biobb_wf_pmx_tutorial/docker/Dockerfile
          sed -i '83a\        cp -r /data/pmx_tutorial \\"$dir/pmx_tutorial\\"; \\' biobb_wf_pmx_tutorial/docker/Dockerfile
          cp common/docker/Dockerfile biobb_wf_protein-complex_md_setup/docker/Dockerfile
          cp common/docker/Dockerfile biobb_wf_structure_checking/docker/Dockerfile
          cp common/docker/Dockerfile biobb_wf_virtual-screening_fpocket/docker/Dockerfile

      - name: Commit and push changes
        env:
          GITHUB_TOKEN: ${{ steps.generate_token.outputs.token }}
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add */docker/Dockerfile && git commit -m "Updated Dockerfile" && git push